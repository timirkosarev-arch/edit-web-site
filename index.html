<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NeverFuse Builder</title>
    <style>
        :root { --bg: #0d0d0d; --panel: #141414; --text: #e0e0e0; --accent: #4f46e5; --border: #262626; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; height: 100vh; }
        
        #builder-mode { display: flex; height: 100vh; width: 100vw; }
        #sidebar { width: 300px; background: var(--panel); padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #workspace { flex: 1; display: flex; flex-direction: column; }
        #toolbar { height: 60px; background: var(--panel); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid var(--border); }
        #editor-container { flex: 1; display: flex; }
        #monaco-editor { flex: 1; height: 100%; border-right: 1px solid var(--border); }
        #preview-frame { flex: 1; border: none; background: #fff; }
        
        input, button { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 4px; outline: none; }
        button { background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        .hidden { display: none !important; }
        
        /* Стили истории и статусов */
        .history-section { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; flex: 1; overflow-y: auto; }
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item { background: #1a1a1a; margin-bottom: 10px; padding: 10px; border-radius: 6px; border: 1px solid #333; }
        .history-header { display: flex; align-items: center; margin-bottom: 8px; }
        .history-header a { color: #818cf8; text-decoration: none; font-size: 14px; flex: 1; font-weight: bold; }
        .history-header a:hover { text-decoration: underline; }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 5px rgba(255,255,255,0.1); }
        .status-online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-offline { background: #ef4444; }
        .status-restarting { background: #6b7280; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .site-controls { display: flex; gap: 5px; }
        .control-btn { background: #262626; border: 1px solid #444; padding: 4px 8px; font-size: 12px; border-radius: 4px; color: #ccc; flex: 1; }
        .control-btn:hover { background: #333; color: #fff; }
        .btn-delete:hover { background: #ef4444; border-color: #ef4444; }

        /* --- СТИЛИ ТУЛБОКСА (КАК GITHUB) --- */
        #toolbox-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .toolbox-window { background: var(--panel); width: 80%; height: 80%; border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .toolbox-header { padding: 15px 20px; background: #111; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .toolbox-content { display: flex; flex: 1; overflow: hidden; }
        .toolbox-sidebar { width: 300px; border-right: 1px solid var(--border); background: #0a0a0a; overflow-y: auto; padding: 10px; }
        .toolbox-viewer { flex: 1; display: flex; flex-direction: column; background: var(--bg); padding: 20px; overflow: hidden; }
        
        .tb-item { background: #1a1a1a; border: 1px solid #333; padding: 10px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .tb-item:hover, .tb-item.active { border-color: var(--accent); background: #222; }
        .tb-item-title { font-weight: bold; font-size: 14px; color: #fff; margin-bottom: 4px; }
        .tb-item-author { font-size: 11px; color: #888; }
        
        #tb-code-display { flex: 1; background: #000; color: #00ff00; padding: 15px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 13px; overflow-y: auto; white-space: pre-wrap; border: 1px solid #333; margin-top: 15px; }
        .tb-viewer-header { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<!-- МОДАЛЬНОЕ ОКНО ТУЛБОКСА -->
<div id="toolbox-modal" class="hidden">
    <div class="toolbox-window">
        <div class="toolbox-header">
            <span>📦 NeverFuse Toolbox (Общедоступные коды)</span>
            <button id="closeToolboxBtn" style="background: transparent; border: 1px solid #444; padding: 4px 10px;">Закрыть</button>
        </div>
        <div class="toolbox-content">
            <div class="toolbox-sidebar" id="toolboxList">
                <!-- Сюда грузятся скрипты -->
                <div style="color: #666; font-size: 13px; text-align: center; margin-top: 20px;">Загрузка...</div>
            </div>
            <div class="toolbox-viewer">
                <div class="tb-viewer-header">
                    <h2 id="tb-view-title" style="margin: 0; color: #fff;">Выберите код из списка</h2>
                    <button id="tb-copy-btn" class="hidden" style="background: #10b981;">📋 Скопировать код</button>
                </div>
                <div id="tb-view-author" style="color: #888; font-size: 12px; margin-top: 5px;"></div>
                <pre id="tb-code-display"></pre>
            </div>
        </div>
    </div>
</div>

<div id="builder-mode">
    <div id="sidebar">
        <h2 style="margin-top:0;">Web IDE</h2>
        <button id="loginBtn">Войти через Google</button>
        <div id="userInfo" class="hidden">
            <span style="color:#888; font-size: 12px;">Аккаунт:</span><br>
            <span id="userName" style="color:#fff; font-weight: bold;"></span>
        </div>
        
        <button id="openToolboxBtn" class="hidden" style="margin-top: 15px; background: #222; border: 1px solid #444; width: 100%;">📦 Открыть Тулбокс</button>
        
        <!-- Блок Истории -->
        <div id="historyBlock" class="history-section hidden">
            <h3 style="font-size: 14px; color: #888; margin-top: 0; display: flex; justify-content: space-between;">
                МОИ САЙТЫ <button id="refreshHistoryBtn" style="padding: 2px 6px; font-size: 10px; background: transparent; border: 1px solid #444;">Обновить</button>
            </h3>
            <ul id="historyList" class="history-list"></ul>
        </div>
    </div>
    
    <div id="workspace">
        <div id="toolbar">
            <input type="text" id="siteNameInput" placeholder="Имя сайта (например: mygame)">
            <button id="testBtn">Локальный тест</button>
            <button id="publishBtn">Сохранить</button>
            <div style="width: 2px; height: 30px; background: #333; margin: 0 5px;"></div>
            <button id="shareToToolboxBtn" style="background: #059669;">Поделиться в Тулбокс</button>
        </div>
        <div id="editor-container">
            <div id="monaco-editor"></div>
            <iframe id="preview-frame"></iframe>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    // Добавили addDoc для генерации случайных ID в тулбоксе
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, deleteDoc, updateDoc, addDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const path = window.location.pathname;
    
    if (path.startsWith('/site/')) {
        document.getElementById('builder-mode').style.display = 'none';
        const siteName = path.split('/').pop();
        if (siteName) loadSiteFromDatabase(siteName);
    } else {
        initBuilder();
    }

    async function loadSiteFromDatabase(name) {
        const siteRef = doc(db, "published_sites", name);
        const docSnap = await getDoc(siteRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.status === 'offline') {
                document.body.innerHTML = `<div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #0d0d0d; color: #fff; font-family: sans-serif;"><h1 style="color: #ef4444;">Сайт выключен</h1></div>`;
            } else if (data.status === 'restarting') {
                document.body.innerHTML = `<div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #0d0d0d; color: #fff; font-family: sans-serif;"><h1 style="color: #6b7280; animation: pulse 1s infinite;">Перезагрузка...</h1></div>`;
                setTimeout(() => location.reload(), 3000);
            } else {
                document.open();
                document.write(data.code);
                document.close();
            }
        } else {
            document.body.innerHTML = "<h1 style='color:red; text-align:center; font-family:sans-serif;'>Ошибка 404: Сайт не найден</h1>";
        }
    }

    function initBuilder() {
        let currentUser = null;
        let currentToolboxCode = ""; // Хранит код выбранного сниппета

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            window.editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: '<!DOCTYPE html>\n<html>\n<head>\n  <title>Новый проект</title>\n</head>\n<body>\n  <h1>Привет!</h1>\n</body>\n</html>',
                language: 'html',
                theme: 'vs-dark',
                automaticLayout: true
            });
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => alert(err.message));
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('historyBlock').classList.remove('hidden');
                document.getElementById('openToolboxBtn').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                
                loadUserHistory(user.uid);
            }
        });

        /* --- ЛОГИКА ТУЛБОКСА --- */
        const toolboxModal = document.getElementById('toolbox-modal');
        
        // Открыть тулбокс
        document.getElementById('openToolboxBtn').addEventListener('click', () => {
            toolboxModal.classList.remove('hidden');
            loadToolboxSnippets();
        });

        // Закрыть тулбокс
        document.getElementById('closeToolboxBtn').addEventListener('click', () => {
            toolboxModal.classList.add('hidden');
        });

        // Опубликовать текущий код в тулбокс
        document.getElementById('shareToToolboxBtn').addEventListener('click', async () => {
            if (!currentUser) return alert("Войдите в аккаунт!");
            
            const title = prompt("Введите понятное название для этого кода (например: 'Кнопка с анимацией'):");
            if (!title) return;

            try {
                await addDoc(collection(db, "toolbox"), {
                    title: title,
                    code: window.editor.getValue(),
                    author: currentUser.displayName,
                    authorId: currentUser.uid,
                    timestamp: new Date()
                });
                alert("Код успешно добавлен в Тулбокс!");
            } catch (error) {
                alert("Ошибка публикации: " + error.message);
            }
        });

        // Загрузка списка кодов из базы
        async function loadToolboxSnippets() {
            const listEl = document.getElementById('toolboxList');
            listEl.innerHTML = '<div style="color: #666; text-align: center;">Загрузка...</div>';
            
            try {
                // Получаем все документы из коллекции toolbox
                const q = query(collection(db, "toolbox"));
                const querySnapshot = await getDocs(q);
                
                listEl.innerHTML = '';
                if(querySnapshot.empty) {
                    listEl.innerHTML = '<div style="color: #666; text-align: center;">Тулбокс пока пуст.</div>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    
                    const item = document.createElement('div');
                    item.className = 'tb-item';
                    item.innerHTML = `
                        <div class="tb-item-title">${data.title}</div>
                        <div class="tb-item-author">От: ${data.author || 'Неизвестный'}</div>
                    `;
                    
                    // При клике показываем код справа
                    item.addEventListener('click', () => {
                        // Убираем подсветку со всех
                        document.querySelectorAll('.tb-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        
                        document.getElementById('tb-view-title').innerText = data.title;
                        document.getElementById('tb-view-author').innerText = `Автор: ${data.author || 'Неизвестный'}`;
                        document.getElementById('tb-code-display').innerText = data.code;
                        currentToolboxCode = data.code;
                        document.getElementById('tb-copy-btn').classList.remove('hidden');
                    });
                    
                    listEl.appendChild(item);
                });
            } catch (err) {
                listEl.innerHTML = '<div style="color: red;">Ошибка загрузки</div>';
                console.error(err);
            }
        }

        // Копирование кода
        document.getElementById('tb-copy-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(currentToolboxCode).then(() => {
                const btn = document.getElementById('tb-copy-btn');
                btn.innerText = "✅ Скопировано!";
                setTimeout(() => btn.innerText = "📋 Скопировать код", 2000);
            });
        });
        /* --- КОНЕЦ ЛОГИКИ ТУЛБОКСА --- */

        // (Здесь остается старый код публикации и истории)
        document.getElementById('refreshHistoryBtn').addEventListener('click', () => {
            if (currentUser) loadUserHistory(currentUser.uid);
        });

        async function loadUserHistory(uid) {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '<span style="color:#666; font-size:12px;">Загрузка...</span>'; 
            const q = query(collection(db, "published_sites"), where("ownerId", "==", uid));
            const querySnapshot = await getDocs(q);
            historyList.innerHTML = '';
            
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const siteName = docSnap.id;
                const status = data.status || 'online';
                
                let dotClass = 'status-online';
                if (status === 'offline') dotClass = 'status-offline';
                if (status === 'restarting') dotClass = 'status-restarting';

                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <div class="history-header">
                        <span class="status-dot ${dotClass}" title="Статус: ${status}"></span>
                        <a href="/site/${siteName}" target="_blank">/${siteName}</a>
                    </div>
                    <div class="site-controls">
                        <button class="control-btn" data-action="edit" data-id="${siteName}">✏️ Код</button>
                        <button class="control-btn" data-action="power" data-id="${siteName}" data-status="${status}">${status === 'offline' ? '▶️ Вкл' : '⏸️ Выкл'}</button>
                        <button class="control-btn" data-action="restart" data-id="${siteName}">🔄</button>
                        <button class="control-btn btn-delete" data-action="delete" data-id="${siteName}">🗑️</button>
                    </div>
                `;
                historyList.appendChild(li);
            });
            attachControlEvents();
        }

        function attachControlEvents() {
            document.querySelectorAll('.control-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const action = e.target.getAttribute('data-action');
                    const siteName = e.target.getAttribute('data-id');
                    const siteRef = doc(db, "published_sites", siteName);

                    if (action === 'edit') {
                        const snap = await getDoc(siteRef);
                        if(snap.exists()) {
                            window.editor.setValue(snap.data().code);
                            document.getElementById('siteNameInput').value = siteName;
                        }
                    } else if (action === 'power') {
                        const currentStatus = e.target.getAttribute('data-status');
                        const newStatus = currentStatus === 'offline' ? 'online' : 'offline';
                        await updateDoc(siteRef, { status: newStatus });
                        loadUserHistory(currentUser.uid);
                    } else if (action === 'restart') {
                        await updateDoc(siteRef, { status: 'restarting' });
                        loadUserHistory(currentUser.uid);
                        setTimeout(async () => {
                            await updateDoc(siteRef, { status: 'online' });
                            loadUserHistory(currentUser.uid);
                        }, 3000);
                    } else if (action === 'delete') {
                        if (confirm(`Удалить сайт ${siteName}?`)) {
                            await deleteDoc(siteRef);
                            loadUserHistory(currentUser.uid);
                            if (document.getElementById('siteNameInput').value === siteName) {
                                document.getElementById('siteNameInput').value = '';
                                window.editor.setValue('<!-- Сайт удален -->');
                            }
                        }
                    }
                });
            });
        }

        document.getElementById('testBtn').addEventListener('click', () => {
            document.getElementById('preview-frame').srcdoc = window.editor.getValue();
        });

        document.getElementById('publishBtn').addEventListener('click', async () => {
            if (!currentUser) return alert("Войдите в аккаунт!");
            const siteName = document.getElementById('siteNameInput').value.trim();
            if (!siteName || siteName.includes('/')) return alert("Введите корректное имя!");

            const siteRef = doc(db, "published_sites", siteName);
            const docSnap = await getDoc(siteRef);
            
            if (docSnap.exists()) {
                if (docSnap.data().ownerId !== currentUser.uid) {
                    return alert("Это имя занято другим пользователем!");
                }
                await updateDoc(siteRef, { code: window.editor.getValue(), lastEdited: new Date() });
                alert("Изменения сохранены!");
            } else {
                await setDoc(siteRef, { ownerId: currentUser.uid, code: window.editor.getValue(), status: 'online', timestamp: new Date() });
                alert("Сайт успешно создан!");
            }
            loadUserHistory(currentUser.uid);
        });
    }
</script>
</body>
</html>
