<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WedEdit | Инструменты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">WedEdit</div>
        <button id="logoutBtn" class="hidden">Выйти</button>
    </header>

    <main id="loginScreen" class="screen active fade-in">
        <div class="login-card">
            <h1>Добро пожаловать</h1>
            <p>Войдите через Google, чтобы получить доступ к инструментам.</p>
            <button id="loginBtn" class="google-btn">Войти через Google</button>
        </div>
    </main>

    <main id="dashboardScreen" class="screen hidden">
        <h2 class="slide-up">Доступные приложения</h2>
        
        <div class="apps-grid">
            <div class="app-card slide-up" style="animation-delay: 0.1s;">
                <div class="app-icon">{' '}</div>
                <h3>CodeEditor</h3>
                <p>Мощный редактор кода прямо в браузере. Поддерживает подсветку синтаксиса, автодополнение, живой предпросмотр и быстрое сохранение сниппетов. Идеально для быстрых правок.</p>
                <button class="launch-btn">Открыть</button>
            </div>
            
            </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
