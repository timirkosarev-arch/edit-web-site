<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 5 Mods</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        input[type="text"], input[type="url"], input[type="file"] { padding: 10px; border: none; border-radius: 5px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        input[type="text"] { background: #222; color: white; border: 1px solid #444; }
        button { padding: 10px 20px; background-color: #f0c808; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #d1ae00; }
        
        #upload-section { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: none; }
        #search-bar { width: 300px; }
        
        .mods-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .mod-card { background: #1e1e1e; border-radius: 8px; overflow: hidden; padding-bottom: 15px; }
        .mod-card img { width: 100%; height: 150px; object-fit: cover; }
        .mod-card h3 { margin: 10px 15px; }
        .mod-card a { display: block; margin: 0 15px; text-decoration: none; background: #e53935; color: white; text-align: center; padding: 8px; border-radius: 5px; }
        .mod-card a:hover { background: #c62828; }
    </style>
</head>
<body>

    <header>
        <h1>GTA 5 Mods</h1>
        <input type="text" id="search-bar" placeholder="Поиск модов...">
        <button id="auth-btn">Войти через Google</button>
    </header>

    <div id="upload-section">
        <h2>Выложить мод</h2>
        <form id="upload-form">
            <input type="text" id="mod-title" placeholder="Название мода" required>
            <input type="url" id="mega-link" placeholder="Ссылка на Mega.nz (обязательно)" required>
            <label for="mod-image">Превью (картинка):</label>
            <input type="file" id="mod-image" accept="image/*" required>
            <button type="submit" id="submit-btn">Загрузить</button>
        </form>
    </div>

    <div class="mods-grid" id="mods-container">
        </div>

    <script type="module" src="app.js"></script>
</body>
</html>
