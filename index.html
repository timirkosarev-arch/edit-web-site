<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 5 Mods Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #1a1a1a; color: #fff; padding-bottom: 50px; }
        header { background: #111; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #00ff66; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; color: #00ff66; cursor: pointer; }
        nav button { background: #222; color: #fff; border: 1px solid #444; padding: 8px 15px; margin-left: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        nav button:hover { background: #00ff66; color: #000; border-color: #00ff66; }
        .btn-upload { background: #00ff66; color: #000; border: none; }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .screen { display: none; }
        .screen.active { display: block; }

        .form-box { background: #222; padding: 30px; border-radius: 8px; max-width: 500px; margin: 50px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .form-box h2 { margin-bottom: 20px; color: #00ff66; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; background: #333; border: 1px solid #555; color: #fff; border-radius: 4px; }
        input[type="file"] { background: none; border: none; }
        .form-box button { width: 100%; padding: 12px; background: #00ff66; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .form-box p { margin-top: 15px; text-align: center; color: #aaa; cursor: pointer; }

        .mods-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .mod-card { background: #222; border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.3s; display: flex; flex-direction: column; }
        .mod-card:hover { transform: translateY(-5px); border-color: #00ff66; }
        .mod-img { width: 100%; height: 180px; object-fit: cover; background: #333; }
        .mod-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .mod-title { font-size: 18px; margin-bottom: 8px; }
        .mod-desc { color: #aaa; font-size: 14px; margin-bottom: 15px; flex-grow: 1; }
        .mod-actions { display: flex; gap: 10px; }
        .btn-download { background: #00ff66; color: #000; padding: 8px; text-align: center; text-decoration: none; font-weight: bold; border-radius: 4px; flex-grow: 1; }
        .btn-delete { background: #ff3333; color: #fff; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
        
        .loading { color: #00ff66; text-align: center; font-size: 18px; margin: 20px 0; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo" id="logo-btn">GTA5 MODS</div>
        <nav>
            <span id="user-email" style="margin-right: 15px; color: #aaa;"></span>
            <button id="nav-main">Главная</button>
            <button id="nav-upload" class="btn-upload" style="display:none;">Upload (Загрузить)</button>
            <button id="nav-profile" style="display:none;">Мой Профиль</button>
            <button id="nav-auth">Войти</button>
            <button id="nav-logout" style="display:none;">Выйти</button>
        </nav>
    </header>

    <div class="container">
        <div id="loading-status" class="loading">Обработка данных, пожалуйста подождите...</div>

        <div id="screen-main" class="screen active">
            <h2>Все моды</h2>
            <div class="mods-grid" id="all-mods-container"></div>
        </div>

        <div id="screen-profile" class="screen">
            <h2>Мои загруженные моды</h2>
            <div class="mods-grid" id="my-mods-container"></div>
        </div>

        <div id="screen-upload" class="screen">
            <div class="form-box">
                <h2>Загрузить новый мод</h2>
                <input type="text" id="mod-title" placeholder="Название мода" required>
                <textarea id="mod-desc" placeholder="Описание мода" rows="4" required></textarea>
                
                <label>Картинка мода (Превью через ImgBB):</label>
                <input type="file" id="mod-image-file" accept="image/*" required>
                
                <label>Ссылка на скачивание архива/мода (Google Диск, Mediafire и т.д.):</label>
                <input type="url" id="mod-file-url" placeholder="https://..." required>
                
                <button id="submit-mod-btn">Опубликовать мод</button>
            </div>
        </div>

        <div id="screen-auth" class="screen">
            <div class="form-box" id="auth-login-form">
                <h2>Вход на сайт</h2>
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button id="login-btn">Войти</button>
                
                <button id="google-login-btn" style="background: #fff; color: #000; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="G" style="width: 18px;">
                    Войти через Google
                </button>
                
                <p onclick="toggleAuthForms(false)">Нет аккаунта? Зарегистрироваться</p>
            </div>
            <div class="form-box" id="auth-register-form" style="display:none;">
                <h2>Регистрация</h2>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-password" placeholder="Пароль (мин. 6 символов)" required>
                <button id="register-btn">Создать аккаунт</button>
                <p onclick="toggleAuthForms(true)">Уже есть аккаунт? Войти</p>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        function toggleAuthForms(showLogin) {
            document.getElementById('auth-login-form').style.display = showLogin ? 'block' : 'none';
            document.getElementById('auth-register-form').style.display = showLogin ? 'none' : 'block';
        }
    </script>
</body>
</html>
