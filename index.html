<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Game Market</title>
    <style>
        /* Игровая темная тема */
        :root {
            --bg-main: #0f0f13;
            --bg-card: #1a1a24;
            --bg-hover: #2a2a36;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #2d2d3d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        header { background: var(--bg-card); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); letter-spacing: 1px; cursor: pointer; }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: var(--text-muted); cursor: pointer; font-weight: bold; transition: 0.3s; padding: 5px 10px; border-radius: 5px; }
        .nav-link:hover, .nav-link.active { color: white; background: var(--bg-hover); }
        
        .btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }

        .view-section { display: none; padding: 20px 30px; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .categories { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .cat-btn { padding: 8px 16px; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--primary); border-color: var(--primary); font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { border-color: var(--primary); box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid var(--border); }
        .card-content { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .card-cat { color: var(--primary); font-size: 12px; text-transform: uppercase; font-weight: bold; }
        .card-price { font-size: 22px; font-weight: bold; margin: 10px 0; color: #4ade80; }
        .card-seller { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 14px; color: var(--text-muted); }
        .card-seller img { width: 24px; height: 24px; border-radius: 50%; border: none; }
        .card-btn { margin-top: auto; width: 100%; }

        .profile-container { display: flex; gap: 30px; flex-wrap: wrap; }
        .profile-settings { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); width: 300px; height: fit-content; text-align: center; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--primary); cursor: pointer; }
        .profile-settings input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; background: var(--bg-main); border: 1px solid var(--border); color: white; border-radius: 6px; text-align: center; }
        .profile-content { flex-grow: 1; }

        /* Чаты */
        .chat-layout { display: flex; height: calc(100vh - 120px); background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .chat-sidebar { width: 300px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .chat-list { overflow-y: auto; flex-grow: 1; }
        .chat-item { padding: 15px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .chat-item:hover, .chat-item.active { background: var(--bg-hover); }
        .chat-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .chat-item-info { overflow: hidden; }
        .chat-item-name { font-weight: bold; margin-bottom: 3px; }
        .chat-item-ad { font-size: 12px; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .chat-main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        .chat-header { padding: 15px; background: var(--bg-card); border-bottom: 1px solid var(--border); font-weight: bold; display: flex; align-items: center; gap: 15px;}
        .chat-header img { width: 40px; height: 40px; border-radius: 50%; }
        .chat-messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 12px; line-height: 1.4; word-wrap: break-word;}
        .msg.me { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.other { background: var(--bg-card); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input { padding: 15px; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input input { flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-main); color: white; outline: none; }
        .chat-input input:focus { border-color: var(--primary); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--bg-card); padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; position: relative; border: 1px solid var(--border); }
        .close { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: var(--text-muted); }
        .close:hover { color: white; }
        form input, form select, form textarea { width: 100%; padding: 12px; margin: 10px 0; background: var(--bg-main); border: 1px solid var(--border); color: white; border-radius: 6px; outline: none;}
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="switchView('home')">P2P GameMarket</div>
        <div class="nav-links" id="nav-links" style="display: none;">
            <div class="nav-link active" onclick="switchView('home')" id="nav-home">Витрина</div>
            <div class="nav-link" onclick="switchView('chats')" id="nav-chats">Чаты</div>
            <div class="nav-link" onclick="switchView('profile')" id="nav-profile">Профиль</div>
        </div>
        <button class="btn" id="auth-btn">Войти (Google)</button>
    </header>

    <!-- Вкладка: ГЛАВНАЯ -->
    <main class="view-section active" id="view-home">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div class="categories" id="categories-container"></div>
            <button class="btn" id="create-ad-btn" style="display: none;">+ Создать объявление</button>
        </div>
        <div class="grid" id="listings-grid"></div>
    </main>

    <!-- Вкладка: ЧАТЫ -->
    <main class="view-section" id="view-chats">
        <div class="chat-layout">
            <div class="chat-sidebar" id="chat-list"></div>
            <div class="chat-main" id="chat-window" style="display: none;">
                <div class="chat-header" id="chat-header">
                    <img src="" id="chat-header-avatar">
                    <div>
                        <div id="chat-header-name">Имя</div>
                        <div id="chat-header-ad" style="font-size: 12px; color: var(--primary);">Объявление</div>
                    </div>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="msg-input" placeholder="Введите сообщение...">
                    <button class="btn" id="send-msg-btn">Отправить</button>
                </div>
            </div>
            <div id="chat-placeholder" style="flex-grow: 1; display: flex; justify-content: center; align-items: center; color: var(--text-muted);">
                Выберите чат слева, чтобы начать общение
            </div>
        </div>
    </main>

    <!-- Вкладка: ПРОФИЛЬ -->
    <main class="view-section" id="view-profile">
        <div class="profile-container">
            <div class="profile-settings">
                <h3>Настройки профиля</h3>
                <img src="https://i.ibb.co/4pDNDk1/avatar.png" id="profile-avatar-img" class="profile-avatar" title="Нажмите для смены">
                <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
                <label style="font-size: 12px; color: var(--text-muted); text-align: left; display: block; margin-top: 10px;">Никнейм</label>
                <input type="text" id="profile-name-input">
                <button class="btn" id="save-profile-btn" style="width: 100%; margin-top: 10px;">Сохранить</button>
                <button class="btn btn-outline" id="logout-btn" style="width: 100%; margin-top: 10px;">Выйти</button>
            </div>
            <div class="profile-content">
                <h2>Мои объявления</h2>
                <div class="grid" id="my-listings-grid" style="margin-top: 20px;"></div>
            </div>
        </div>
    </main>

    <!-- Модалка создания объявления -->
    <div class="modal" id="create-modal">
        <div class="modal-content">
            <span class="close" id="close-create">&times;</span>
            <h2 style="margin-bottom: 20px;">Новое объявление</h2>
            <form id="create-form">
                <input type="text" id="ad-title" placeholder="Название (напр. Аккаунт Brawl Stars, Буст Доты)" required>
                <select id="ad-category" required></select>
                <input type="number" id="ad-price" placeholder="Цена (₽)" required>
                <textarea id="ad-desc" placeholder="Описание товара" rows="4" required></textarea>
                <input type="file" id="ad-image" accept="image/*" required>
                <button type="submit" class="btn" style="width: 100%; margin-top: 15px;" id="submit-ad-btn">Опубликовать</button>
            </form>
        </div>
    </div>

    <!-- Звук -->
    <audio id="notify-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { firebaseConfig, imgbbApiKey } from './config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, setDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        // ПОДКЛЮЧАЕМ REALTIME DATABASE SDK
        import { getDatabase, ref, set, push, onValue, off, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app); // Инициализация RTDB
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let userData = null;
        let activeChatId = null;
        let activeChatRef = null;
        let isInitialChatLoad = true;

        const categories = ['Все', 'Игровая валюта', 'Аккаунты', 'Предметы / Скины', 'Прокачка (Буст)', 'Игровые достижения', 'Ключи / Гифты'];
        let currentCategory = 'Все';

        function renderCategories() {
            const catContainer = document.getElementById('categories-container');
            const selectContainer = document.getElementById('ad-category');
            catContainer.innerHTML = categories.map(cat => `<button class="cat-btn ${cat === currentCategory ? 'active' : ''}" onclick="window.setCategory('${cat}')">${cat}</button>`).join('');
            selectContainer.innerHTML = categories.filter(c => c !== 'Все').map(cat => `<option value="${cat}">${cat}</option>`).join('');
        }
        window.setCategory = (cat) => { currentCategory = cat; renderCategories(); loadListings('home'); };

        window.switchView = (viewName) => {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            if(document.getElementById(`nav-${viewName}`)) document.getElementById(`nav-${viewName}`).classList.add('active');
            if (viewName === 'home') loadListings('home');
            if (viewName === 'profile') loadListings('profile');
        };

        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbApiKey}`, { method: 'POST', body: formData });
            const data = await res.json();
            return data.data.url;
        }

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                const userDocRef = doc(db, "users", user.uid);
                let docSnap = await getDoc(userDocRef);
                if (!docSnap.exists()) {
                    userData = { uid: user.uid, displayName: user.displayName || "Gamer", photoURL: user.photoURL || "https://i.ibb.co/4pDNDk1/avatar.png" };
                    await setDoc(userDocRef, userData);
                } else {
                    userData = docSnap.data();
                }
                document.getElementById('auth-btn').style.display = 'none';
                document.getElementById('nav-links').style.display = 'flex';
                document.getElementById('create-ad-btn').style.display = 'block';
                document.getElementById('profile-name-input').value = userData.displayName;
                document.getElementById('profile-avatar-img').src = userData.photoURL;

                initChatListListener(); // Запуск прослушки чатов
                switchView('home');
            } else {
                document.getElementById('auth-btn').style.display = 'block';
                document.getElementById('nav-links').style.display = 'none';
                document.getElementById('create-ad-btn').style.display = 'none';
                switchView('home');
            }
        });

        document.getElementById('auth-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
        document.getElementById('profile-avatar-img').onclick = () => document.getElementById('avatar-upload').click();
        document.getElementById('avatar-upload').onchange = (e) => {
            if(e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('profile-avatar-img').src = e.target.result;
                reader.readAsDataURL(e.target.files[0]);
            }
        };

        document.getElementById('save-profile-btn').onclick = async () => {
            const btn = document.getElementById('save-profile-btn');
            btn.innerText = "Сохранение..."; btn.disabled = true;
            let newAvatarUrl = userData.photoURL;
            const fileInput = document.getElementById('avatar-upload');
            const newName = document.getElementById('profile-name-input').value.trim();
            try {
                if (fileInput.files.length > 0) newAvatarUrl = await uploadToImgBB(fileInput.files[0]);
                userData.displayName = newName || userData.displayName;
                userData.photoURL = newAvatarUrl;
                await updateDoc(doc(db, "users", currentUser.uid), { displayName: userData.displayName, photoURL: userData.photoURL });
                alert("Профиль изменен!");
                loadListings('home');
            } catch (err) { alert(err.message); }
            finally { btn.innerText = "Сохранить"; btn.disabled = false; }
        };

        document.getElementById('create-ad-btn').onclick = () => document.getElementById('create-modal').style.display = 'flex';
        document.getElementById('close-create').onclick = () => document.getElementById('create-modal').style.display = 'none';

        document.getElementById('create-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-ad-btn');
            btn.innerText = "Загрузка..."; btn.disabled = true;
            try {
                const imageUrl = await uploadToImgBB(document.getElementById('ad-image').files[0]);
                await addDoc(collection(db, "listings"), {
                    title: document.getElementById('ad-title').value,
                    category: document.getElementById('ad-category').value,
                    price: Number(document.getElementById('ad-price').value),
                    description: document.getElementById('ad-desc').value,
                    imageUrl: imageUrl,
                    sellerId: currentUser.uid,
                    createdAt: Date.now()
                });
                document.getElementById('create-modal').style.display = 'none';
                document.getElementById('create-form').reset();
                loadListings('home');
            } catch (err) { alert(err.message); }
            finally { btn.innerText = "Опубликовать"; btn.disabled = false; }
        };

        async function loadListings(tab) {
            const gridId = tab === 'home' ? 'listings-grid' : 'my-listings-grid';
            const grid = document.getElementById(gridId);
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center;">Загрузка витрины...</div>';
            const qSnap = await getDocs(collection(db, "listings"));
            grid.innerHTML = '';
            let count = 0;
            for (const documentSnap of qSnap.docs) {
                const data = documentSnap.data();
                if (tab === 'home' && currentCategory !== 'Все' && data.category !== currentCategory) continue;
                if (tab === 'profile' && data.sellerId !== currentUser?.uid) continue;

                let sellerInfo = { displayName: "Игрок", photoURL: "https://i.ibb.co/4pDNDk1/avatar.png" };
                const sellerDoc = await getDoc(doc(db, "users", data.sellerId));
                if (sellerDoc.exists()) sellerInfo = sellerDoc.data();

                count++;
                const isMyAd = currentUser && currentUser.uid === data.sellerId;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${data.imageUrl}">
                    <div class="card-content">
                        <div class="card-cat">${data.category}</div>
                        <div class="card-title">${data.title}</div>
                        <div class="card-price">${data.price} ₽</div>
                        <div class="card-seller"><img src="${sellerInfo.photoURL}"><span>${sellerInfo.displayName}</span></div>
                        ${!isMyAd ? `<button class="btn card-btn" onclick="window.initiateChat('${data.sellerId}', '${documentSnap.id}', '${data.title.replace(/'/g, "\\'")}', '${sellerInfo.displayName.replace(/'/g, "\\'")}', '${sellerInfo.photoURL}')">Написать продавцу</button>` : `<button class="btn btn-outline card-btn" disabled>Ваш товар</button>`}
                    </div>
                `;
                grid.appendChild(card);
            }
            if (count === 0) grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color: var(--text-muted);">Товаров нет</div>';
        }

        // --- ОБНОВЛЕННАЯ ЛОГИКА ЧАТА НА REALTIME DATABASE ---

        // 1. Создание чата при нажатии на кнопку "Написать продавцу"
        window.initiateChat = async (sellerId, listingId, listingTitle, sellerName, sellerAvatar) => {
            if (!currentUser) return alert("Войдите в аккаунт!");
            
            // Чистый ID чата без запрещенных символов Firestore (.#$ и т.д.)
            const chatId = `${listingId}_${currentUser.uid}_${sellerId}`.replace(/[\.\#\$\[\]]/g, "-");
            
            const chatRef = ref(rtdb, `chats/${chatId}`);
            await set(chatRef, {
                chatId: chatId,
                listingId: listingId,
                listingTitle: listingTitle,
                participants: [currentUser.uid, sellerId],
                usersInfo: {
                    [currentUser.uid]: { name: userData.displayName, avatar: userData.photoURL },
                    [sellerId]: { name: sellerName, avatar: sellerAvatar }
                },
                updatedAt: Date.now()
            });

            switchView('chats');
            openChatWindow(chatId, sellerId, sellerName, sellerAvatar, listingTitle);
        };

        // 2. Слушатель списка чатов в левой панели
        function initChatListListener() {
            const chatsRef = ref(rtdb, "chats");
            onValue(chatsRef, (snapshot) => {
                const listEl = document.getElementById('chat-list');
                listEl.innerHTML = '';
                
                if (!snapshot.exists()) {
                    listEl.innerHTML = '<div style="padding:20px; text-align:center; color:gray;">Нет активных чатов</div>';
                    return;
                }

                let chatsArr = [];
                snapshot.forEach(child => {
                    const data = child.val();
                    if (data.participants && data.participants.includes(currentUser.uid)) {
                        chatsArr.push(data);
                    }
                });

                chatsArr.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

                if(chatsArr.length === 0) {
                    listEl.innerHTML = '<div style="padding:20px; text-align:center; color:gray;">Нет активных чатов</div>';
                    return;
                }

                chatsArr.forEach(data => {
                    const otherId = data.participants.find(id => id !== currentUser.uid);
                    const otherInfo = data.usersInfo[otherId] || { name: "Пользователь", avatar: "https://i.ibb.co/4pDNDk1/avatar.png" };
                    
                    const item = document.createElement('div');
                    item.className = `chat-item ${activeChatId === data.chatId ? 'active' : ''}`;
                    item.onclick = () => openChatWindow(data.chatId, otherId, otherInfo.name, otherInfo.avatar, data.listingTitle);
                    item.innerHTML = `
                        <img src="${otherInfo.avatar}">
                        <div class="chat-item-info">
                            <div class="chat-item-name">${otherInfo.name}</div>
                            <div class="chat-item-ad">${data.listingTitle}</div>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
            });
        }

        // 3. Открытие чата и прослушка новых сообщений
        function openChatWindow(chatId, otherId, otherName, otherAvatar, listingTitle) {
            activeChatId = chatId;
            isInitialChatLoad = true; // Сбрасываем флаг для первой загрузки истории

            document.getElementById('chat-placeholder').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-header-avatar').src = otherAvatar;
            document.getElementById('chat-header-name').innerText = otherName;
            document.getElementById('chat-header-ad').innerText = `Товар: ${listingTitle}`;

            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));

            if (activeChatRef) off(activeChatRef); // Отписываемся от старого рефа сообщений

            const msgContainer = document.getElementById('chat-messages');
            msgContainer.innerHTML = '';

            activeChatRef = ref(rtdb, `messages/${chatId}`);
            
            onValue(activeChatRef, (snapshot) => {
                msgContainer.innerHTML = '';
                
                if (!snapshot.exists()) {
                    isInitialChatLoad = false;
                    return;
                }

                let lastSenderId = "";
                snapshot.forEach(child => {
                    const msgData = child.val();
                    const isMe = msgData.senderId === currentUser.uid;
                    lastSenderId = msgData.senderId;

                    const msgEl = document.createElement('div');
                    msgEl.className = `msg ${isMe ? 'me' : 'other'}`;
                    msgEl.innerText = msgData.text;
                    msgContainer.appendChild(msgEl);
                });

                msgContainer.scrollTop = msgContainer.scrollHeight;

                // Звуковое уведомление срабатывает, только если это новое сообщение от собеседника
                if (!isInitialChatLoad && lastSenderId !== currentUser.uid) {
                    document.getElementById('notify-sound').play().catch(e => console.log("Sound error:", e));
                }
                
                isInitialChatLoad = false; // Первая пачка сообщений загружена
            });
        }

        // 4. Отправка сообщения
        document.getElementById('send-msg-btn').onclick = async () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !activeChatId) return;

            input.value = '';

            // Пушим сообщение в ветку сообщений этого чата
            const messagesRef = ref(rtdb, `messages/${activeChatId}`);
            const newMsgRef = push(messagesRef);
            await set(newMsgRef, {
                text: text,
                senderId: currentUser.uid,
                createdAt: Date.now()
            });

            // Обновляем таймштамп самого чата, чтобы он прыгнул наверх списка
            const chatMetaRef = ref(rtdb, `chats/${activeChatId}`);
            await update(chatMetaRef, {
                updatedAt: Date.now()
            });
        };

        document.getElementById('msg-input').onkeypress = (e) => { if (e.key === 'Enter') document.getElementById('send-msg-btn').click(); };

        renderCategories();
    </script>
</body>
</html>
