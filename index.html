<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WED EDITOR</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-container">
                <span class="logo-text">WED EDITOR</span>
            </div>
            
            <button id="btn-google-auth" class="btn-auth">Войти через Google</button>

            <div class="project-files-section">
                <h3>ФАЙЛЫ ПРОЕКТА</h3>
                <div class="file-add-block">
                    <input type="text" id="new-file-name" placeholder="style.css или script.js">
                    <button id="btn-add-file">+</button>
                </div>
                <ul class="files-list" id="files-list">
                    <li class="file-item active" data-file="index.html">index.html</li>
                </ul>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="meta-inputs">
                    <input type="text" id="site-title" placeholder="Имя сайта (Заголовок вкладки)" class="editor-input">
                    <input type="text" id="site-favicon" placeholder="Ссылка на аву вкладки (URL)" class="editor-input">
                    <input type="password" id="site-password" placeholder="Защитить паролем (опция)" class="editor-input">
                </div>
                
                <div class="controls-buttons">
                    <div class="dropdown">
                        <button id="btn-libraries" class="btn-nav">Библиотеки</button>
                    </div>
                    <button id="btn-test" class="btn-action btn-blue">Тест</button>
                    <button id="btn-save" class="btn-action btn-purple">Сохранить</button>
                </div>
            </header>

            <div class="editor-container">
                <textarea id="code-textarea" class="code-zone"></textarea>
            </div>
        </main>
    </div>

    <div id="toast-notification" class="toast hidden"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
