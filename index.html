<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Маркетплейс</title>
    <style>
        :root {
            --primary: #007bff;
            --bg: #f4f4f9;
            --text: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); }
        
        /* Navbar */
        header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); }
        .btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn:hover { background: #0056b3; }
        
        /* Categories */
        .categories { display: flex; gap: 10px; padding: 20px 30px; overflow-x: auto; }
        .cat-btn { padding: 8px 15px; background: #ddd; border: none; border-radius: 20px; cursor: pointer; }
        .cat-btn.active { background: var(--primary); color: white; }

        /* Listings Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 0 30px 30px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-price { font-size: 20px; font-weight: bold; margin: 10px 0; color: #28a745; }
        .card-btn { margin-top: auto; background: #28a745; width: 100%; padding: 10px; color: white; text-align: center; border: none; border-radius: 5px; cursor: pointer; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 500px; position: relative; }
        .close { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; }
        
        /* Forms & Chat */
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .chat-box { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; background: #fafafa; display: flex; flex-direction: column; gap: 5px;}
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; word-wrap: break-word; }
        .msg.me { background: var(--primary); color: white; align-self: flex-end; }
        .msg.other { background: #e0e0e0; align-self: flex-start; }
        .chat-input-area { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MyMarket</div>
        <div id="user-info">
            <button class="btn" id="add-btn">Загрузить объявление</button>
        </div>
    </header>

    <div class="categories" id="categories-container">
        <!-- Категории сгенерируются через JS -->
    </div>

    <div class="grid" id="listings-grid">
        <!-- Объявления появятся тут -->
    </div>

    <!-- Модальное окно создания объявления -->
    <div class="modal" id="create-modal">
        <div class="modal-content">
            <span class="close" id="close-create">&times;</span>
            <h2>Новое объявление</h2>
            <form id="create-form">
                <input type="text" id="ad-title" placeholder="Название товара" required>
                <select id="ad-category" required>
                    <option value="Электроника">Электроника</option>
                    <option value="Одежда">Одежда</option>
                    <option value="Услуги">Услуги</option>
                    <option value="Авто">Авто</option>
                </select>
                <input type="number" id="ad-price" placeholder="Цена" required>
                <textarea id="ad-desc" placeholder="Описание" rows="3" required></textarea>
                <input type="file" id="ad-image" accept="image/*" required>
                <button type="submit" class="btn" style="width: 100%;" id="submit-ad-btn">Опубликовать</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно чата -->
    <div class="modal" id="chat-modal">
        <div class="modal-content">
            <span class="close" id="close-chat">&times;</span>
            <h2 id="chat-title">Чат с продавцом</h2>
            <div class="chat-box" id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Напишите сообщение...">
                <button class="btn" id="send-msg-btn">Отправить</button>
            </div>
        </div>
    </div>

    <!-- Звук уведомления (короткий приятный щелчок) -->
    <audio id="notify-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module">
        // Импортируем конфиги
        import { firebaseConfig, imgbbApiKey } from './config.js';
        
        // Импортируем Firebase SDK (v9 modular)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let activeChatId = null;
        let unsubscribeChat = null; // Для отписки от сообщений при закрытии чата

        // UI Элементы
        const addBtn = document.getElementById('add-btn');
        const createModal = document.getElementById('create-modal');
        const closeCreate = document.getElementById('close-create');
        const createForm = document.getElementById('create-form');
        const listingsGrid = document.getElementById('listings-grid');
        const chatModal = document.getElementById('chat-modal');
        const closeChat = document.getElementById('close-chat');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendMsgBtn = document.getElementById('send-msg-btn');
        const notifySound = document.getElementById('notify-sound');

        // Категории
        const categories = ['Все', 'Электроника', 'Одежда', 'Услуги', 'Авто'];
        let currentCategory = 'Все';

        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = categories.map(cat => 
                `<button class="cat-btn ${cat === currentCategory ? 'active' : ''}" onclick="window.setCategory('${cat}')">${cat}</button>`
            ).join('');
        }

        window.setCategory = (cat) => {
            currentCategory = cat;
            renderCategories();
            loadListings();
        };

        // Слушатель состояния пользователя
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                addBtn.innerText = "+ Добавить объявление";
            } else {
                addBtn.innerText = "Загрузить объявление (Вход)";
            }
        });

        // Кнопка добавления / входа
        addBtn.addEventListener('click', async () => {
            if (!currentUser) {
                try {
                    await signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Ошибка входа:", error);
                }
            } else {
                createModal.style.display = 'flex';
            }
        });

        closeCreate.onclick = () => createModal.style.display = 'none';
        closeChat.onclick = () => {
            chatModal.style.display = 'none';
            if (unsubscribeChat) unsubscribeChat(); // Отключаем прослушку при закрытии
        };

        // Создание объявления (ImgBB + Firestore)
        createForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-ad-btn');
            submitBtn.innerText = "Загрузка фото...";
            submitBtn.disabled = true;

            const file = document.getElementById('ad-image').files[0];
            const formData = new FormData();
            formData.append('image', file);

            try {
                // Загрузка в ImgBB
                const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbApiKey}`, {
                    method: 'POST',
                    body: formData
                });
                const imgData = await imgRes.json();
                const imageUrl = imgData.data.url;

                submitBtn.innerText = "Публикация...";

                // Сохранение в Firebase
                await addDoc(collection(db, "listings"), {
                    title: document.getElementById('ad-title').value,
                    category: document.getElementById('ad-category').value,
                    price: Number(document.getElementById('ad-price').value),
                    description: document.getElementById('ad-desc').value,
                    imageUrl: imageUrl,
                    sellerId: currentUser.uid,
                    sellerName: currentUser.displayName,
                    createdAt: serverTimestamp()
                });

                createModal.style.display = 'none';
                createForm.reset();
                loadListings(); // Перезагружаем ленту
            } catch (error) {
                alert("Ошибка публикации: " + error.message);
            } finally {
                submitBtn.innerText = "Опубликовать";
                submitBtn.disabled = false;
            }
        });

        // Загрузка объявлений
        async function loadListings() {
            listingsGrid.innerHTML = 'Загрузка...';
            const querySnapshot = await getDocs(collection(db, "listings"));
            listingsGrid.innerHTML = '';
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if (currentCategory !== 'Все' && data.category !== currentCategory) return;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${data.imageUrl}" alt="${data.title}">
                    <div class="card-content">
                        <h3>${data.title}</h3>
                        <p style="color: #666; font-size: 14px;">${data.category}</p>
                        <div class="card-price">${data.price} ₽</div>
                        <p style="font-size: 14px; margin-bottom: 15px;">${data.description}</p>
                        <button class="card-btn" onclick="window.openChat('${data.sellerId}', '${doc.id}')">Написать продавцу</button>
                    </div>
                `;
                listingsGrid.appendChild(card);
            });
        }

        // --- ЛОГИКА ЧАТА ---
        window.openChat = async (sellerId, listingId) => {
            if (!currentUser) {
                alert("Сначала войдите в систему (нажмите 'Загрузить объявление')");
                return;
            }
            if (currentUser.uid === sellerId) {
                alert("Это ваше объявление!");
                return;
            }

            // Генерируем уникальный ID чата для этой пары пользователей и объявления
            activeChatId = `${listingId}_${[currentUser.uid, sellerId].sort().join('_')}`;
            chatModal.style.display = 'flex';
            chatMessages.innerHTML = '';

            // Подписка на сообщения в реальном времени
            const q = query(collection(db, "messages"), where("chatId", "==", activeChatId), orderBy("createdAt", "asc"));
            
            unsubscribeChat = onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const msgData = change.doc.data();
                        
                        // Создаем элемент сообщения
                        const msgEl = document.createElement('div');
                        const isMe = msgData.senderId === currentUser.uid;
                        msgEl.className = `msg ${isMe ? 'me' : 'other'}`;
                        msgEl.innerText = msgData.text;
                        chatMessages.appendChild(msgEl);
                        chatMessages.scrollTop = chatMessages.scrollHeight; // Скролл вниз

                        // Воспроизводим звук, если сообщение прислал НЕ я
                        if (!isMe && !change.doc.metadata.hasPendingWrites) {
                            notifySound.play().catch(e => console.log("Автоплей звука заблокирован браузером", e));
                        }
                    }
                });
            });
        };

        // Отправка сообщения
        sendMsgBtn.addEventListener('click', async () => {
            const text = chatInput.value.trim();
            if (!text || !activeChatId) return;

            chatInput.value = ''; // Очищаем поле сразу
            
            await addDoc(collection(db, "messages"), {
                chatId: activeChatId,
                text: text,
                senderId: currentUser.uid,
                createdAt: serverTimestamp()
            });
        });

        // Отправка по Enter
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsgBtn.click();
        });

        // Инициализация при старте
        renderCategories();
        loadListings();
    </script>
</body>
</html>
