<script type="module">
    import { firebaseConfig } from '/config.js'; 
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, deleteDoc, updateDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- ИНТЕРНАЦИОНАЛИЗАЦИЯ (i18n) ---
    const i18n = {
        en: {
            login: "Log in with Google", account: "Account:", projectFiles: "PROJECT FILES", filePlaceholder: "style.css or script.js",
            mySites: "MY SITES", refresh: "Refresh", gallery: "Gallery", editor: "Editor", menu: "Menu",
            siteName: "Site name (slug)", siteDesc: "Short description", tabTitle: "Tab title", favicon: "Favicon URL",
            password: "Password (opt.)", libraries: "Libraries ▾", inGallery: "To gallery", test: "Test", save: "Save",
            galleryTitle: "Sites Gallery", searchPlaceholder: "Search by name or description...",
            loadingGallery: "Loading gallery...", emptyGallery: "No sites in the gallery yet. Publish yours first!",
            views: "Views", released: "Released", openBtn: "Open", editCode: "Edit code", 
            powerOff: "Turn off site", powerOn: "Turn on site", restartSite: "Restart", deleteForever: "Delete forever",
            siteOffline: "Site is offline", siteRestarting: "Restarting...", enterPass: "Enter password", unlockBtn: "Unlock", wrongPass: "Wrong password!"
        },
        ru: {
            login: "Войти через Google", account: "Аккаунт:", projectFiles: "ФАЙЛЫ ПРОЕКТА", filePlaceholder: "style.css или script.js",
            mySites: "МОИ САЙТЫ", refresh: "Обновить", gallery: "Галерея", editor: "Редактор", menu: "Меню",
            siteName: "Имя сайта (ссылка)", siteDesc: "Краткое описание", tabTitle: "Заголовок вкладки", favicon: "Ссылка на аву",
            password: "Пароль (опц.)", libraries: "Библиотеки ▾", inGallery: "В галерею", test: "Тест", save: "Сохранить",
            galleryTitle: "Галерея сайтов", searchPlaceholder: "Поиск по названию или описанию...",
            loadingGallery: "Загрузка галереи...", emptyGallery: "В галерее пока нет сайтов. Опубликуйте свой первым!",
            views: "Просмотров", released: "Выпущено", openBtn: "Перейти", editCode: "Редактировать код",
            powerOff: "Выключить сайт", powerOn: "Включить сайт", restartSite: "Перезагрузить", deleteForever: "Удалить навсегда",
            siteOffline: "Сайт выключен", siteRestarting: "Перезагрузка...", enterPass: "Введите пароль", unlockBtn: "Войти", wrongPass: "Неверный пароль!"
        }
    };
    
    let currentLang = 'en';
    let currentProjectCreatedAt = null;

    function switchLanguage(lang) {
        currentLang = lang;
        document.getElementById('langToggleBtn').innerText = lang.toUpperCase();
        
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[lang][key]) el.innerText = i18n[lang][key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (i18n[lang][key]) el.placeholder = i18n[lang][key];
        });

        const storeContainer = document.getElementById('store-container');
        const viewToggleBtn = document.getElementById('viewToggleBtn');
        if (viewToggleBtn) {
            viewToggleBtn.innerText = storeContainer.classList.contains('hidden') ? i18n[lang].gallery : i18n[lang].editor;
        }
    }

    document.getElementById('langToggleBtn').addEventListener('click', () => {
        switchLanguage(currentLang === 'en' ? 'ru' : 'en');
        if (!document.getElementById('store-container').classList.contains('hidden')) {
            loadStoreSites();
        }
    });

    let projectFiles = {
        "index.html": "<!DOCTYPE html>\n<html>\n<head>\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>New Project</title>\n</head>\n<body>\n  <h1>Hello World</h1>\n</body>\n</html>"
    };
    let currentFileName = "index.html";

    window.showToast = function(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerText = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'fadeOut 0.3s ease forwards';
            toast.addEventListener('animationend', () => toast.remove());
        }, 3000);
    }

    function renderFilesList() {
        const list = document.getElementById('filesList');
        list.innerHTML = '';
        Object.keys(projectFiles).forEach(name => {
            const li = document.createElement('li');
            li.className = `file-item ${name === currentFileName ? 'active' : ''}`;
            
            const nameSpan = document.createElement('span');
            nameSpan.innerText = name;
            nameSpan.style.flex = "1";
            nameSpan.addEventListener('click', () => switchFile(name));
            li.appendChild(nameSpan);

            if (name !== 'index.html') {
                const del = document.createElement('button');
                del.className = 'file-delete-btn';
                del.innerHTML = '×';
                del.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(confirm(currentLang === 'ru' ? `Удалить файл ${name}?` : `Delete file ${name}?`)) {
                        delete projectFiles[name];
                        if (currentFileName === name) currentFileName = 'index.html';
                        renderFilesList();
                        window.editor.setValue(projectFiles[currentFileName]);
                        updateEditorLanguage(currentFileName);
                    }
                });
                li.appendChild(del);
            }
            list.appendChild(li);
        });
    }

    function switchFile(name) {
        if(window.editor) projectFiles[currentFileName] = window.editor.getValue();
        currentFileName = name;
        window.editor.setValue(projectFiles[currentFileName]);
        updateEditorLanguage(name);
        renderFilesList();
    }

    function updateEditorLanguage(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        let lang = 'html';
        if (ext === 'css') lang = 'css';
        if (ext === 'js') lang = 'javascript';
        monaco.editor.setModelLanguage(window.editor.getModel(), lang);
    }

    function compileProject() {
        if(window.editor) projectFiles[currentFileName] = window.editor.getValue();
        
        let htmlContent = projectFiles["index.html"] || '';
        let cssBundle = '';
        let jsBundle = '';

        // Собираем CSS и JS из дополнительных файлов
        Object.keys(projectFiles).forEach(name => {
            if (name.endsWith('.css')) cssBundle += `\n/* --- ${name} --- */\n${projectFiles[name]}`;
            if (name.endsWith('.js')) jsBundle += `\n// --- ${name} ---\n${projectFiles[name]}`;
        });

        // Вставляем стили
        if (cssBundle) {
            if (htmlContent.includes('</head>')) {
                htmlContent = htmlContent.replace('</head>', `<style>${cssBundle}</style>\n</head>`);
            } else {
                htmlContent = `<style>${cssBundle}</style>\n` + htmlContent;
            }
        }

        // --- ДОБАВЛЕНИЕ ВОДЯНОГО ЗНАКА WED EDITOR ---
        const watermark = `
        <div style="position: fixed; bottom: 15px; right: 15px; background: rgba(20, 20, 20, 0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: #e0e0e0; padding: 10px 16px; border-radius: 8px; font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 13px; z-index: 2147483647; border: 1px solid #262626; box-shadow: 0 8px 20px rgba(0,0,0,0.5); pointer-events: auto; user-select: none;">
            Создано на wededit.xyz за 5 минут. 
            <a href="https://wededit.xyz" target="_blank" style="color: #4f46e5; text-decoration: none; font-weight: bold; margin-left: 6px; transition: 0.2s;" onmouseover="this.style.filter='brightness(1.2)'" onmouseout="this.style.filter='none'">[Создать свой сайт]</a>
        </div>`;
        
        // Внедряем водяной знак перед закрывающим тегом </body> или в конец документа
        if (htmlContent.includes('</body>')) {
            htmlContent = htmlContent.replace('</body>', watermark + '\n</body>');
        } else {
            htmlContent += watermark;
        }

        // Вставляем скрипты
        if (jsBundle) {
            if (htmlContent.includes('</body>')) {
                htmlContent = htmlContent.replace('</body>', `<script>${jsBundle}<\/script>\n</body>`);
            } else {
                htmlContent = htmlContent + `\n<script>${jsBundle}<\/script>`;
            }
        }
        
        return htmlContent;
    }

    document.getElementById('createFileBtn').addEventListener('click', () => {
        const input = document.getElementById('newFileName');
        const name = input.value.trim();
        if (!name) return showToast(currentLang === 'ru' ? "Укажите имя файла!" : "Specify file name!", "error");
        if (projectFiles[name]) return showToast(currentLang === 'ru' ? "Файл уже существует!" : "File already exists!", "error");
        
        const ext = name.split('.').pop().toLowerCase();
        let initialCode = '';
        if (ext === 'css') initialCode = '/* Styles */';
        if (ext === 'js') initialCode = '// Logic';

        projectFiles[name] = initialCode;
        input.value = '';
        renderFilesList();
        switchFile(name);
        showToast(currentLang === 'ru' ? `Файл ${name} добавлен!` : `File ${name} added!`);
    });

    document.addEventListener('click', (e) => {
        if (!e.target.matches('.dots-btn')) {
            document.querySelectorAll('.dropdown-content:not(#libDropdown)').forEach(d => d.classList.remove('show'));
        } else {
            document.querySelectorAll('.dropdown-content:not(#libDropdown)').forEach(d => {
                if (d !== e.target.nextElementSibling) d.classList.remove('show');
            });
            e.target.nextElementSibling.classList.toggle('show');
        }
        const libDropdown = document.getElementById('libDropdown');
        if (!e.target.matches('#libBtn')) {
            if (libDropdown) libDropdown.classList.remove('show');
        } else {
            if (libDropdown) libDropdown.classList.toggle('show');
        }
    });

    document.querySelectorAll('.lib-item').forEach(item => {
        item.addEventListener('click', (e) => {
            const cdnTag = e.target.getAttribute('data-cdn');
            switchFile('index.html');
            let code = window.editor.getValue();
            if (code.includes(cdnTag)) return showToast(currentLang === 'ru' ? "Библиотека уже подключена!" : "Library already connected!", "error");

            if (code.includes('</head>')) code = code.replace('</head>', `    ${cdnTag}\n</head>`);
            else code = cdnTag + "\n" + code;
            
            window.editor.setValue(code);
            projectFiles["index.html"] = code;
            showToast(currentLang === 'ru' ? "Библиотека подключена!" : "Library connected!");
        });
    });

    const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    toggleSidebarBtn.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        sidebarOverlay.classList.toggle('open');
    });
    sidebarOverlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
    });

    document.getElementById('testBtn').addEventListener('click', () => {
        const compiled = compileProject();
        const testWindow = window.open();
        if (testWindow) {
            testWindow.document.open();
            testWindow.document.write(compiled);
            testWindow.document.close();
        } else {
            showToast(currentLang === 'ru' ? "Всплывающее окно заблокировано!" : "Popup blocked!", "error");
        }
    });

    // --- ЛОГИКА ГАЛЕРЕИ, СЧЕТЧИКОВ И ДАТЫ ---
    const viewToggleBtn = document.getElementById('viewToggleBtn');
    const editorContainer = document.getElementById('editor-container');
    const storeContainer = document.getElementById('store-container');
    const storeGrid = document.getElementById('store-grid');
    const storeSearchInput = document.getElementById('storeSearchInput');

    viewToggleBtn.addEventListener('click', () => {
        if (storeContainer.classList.contains('hidden')) {
            storeContainer.classList.remove('hidden');
            editorContainer.classList.add('hidden');
            viewToggleBtn.innerText = i18n[currentLang].editor;
            loadStoreSites();
        } else {
            storeContainer.classList.add('hidden');
            editorContainer.classList.remove('hidden');
            viewToggleBtn.innerText = i18n[currentLang].gallery;
        }
    });

    async function loadStoreSites() {
        storeGrid.innerHTML = `<span style="color:#666; font-size:14px;">${i18n[currentLang].loadingGallery}</span>`;
        try {
            const q = query(collection(db, "published_sites"), where("isPublic", "==", true));
            const querySnapshot = await getDocs(q);
            storeGrid.innerHTML = '';

            let hasVisibleSites = false;

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if (data.status !== 'online') return; 
                
                hasVisibleSites = true;
                const siteName = docSnap.id;
                const desc = data.description || (currentLang === 'ru' ? 'Описание отсутствует.' : 'No description provided.');
                const viewsCount = data.views || 0;
                
                const dateStr = data.createdAt ? new Date(data.createdAt).toLocaleDateString(currentLang === 'ru' ? 'ru-RU' : 'en-US') : '---';
                
                const card = document.createElement('div');
                card.className = 'store-card';
                card.setAttribute('data-name', siteName.toLowerCase());
                card.setAttribute('data-desc', desc.toLowerCase());
                
                card.innerHTML = `
                    <h4>/${siteName}</h4>
                    <p>${desc}</p>
                    <div style="font-size: 11px; color: #666; display: flex; justify-content: space-between; margin-top: auto; border-top: 1px solid #1f1f1f; padding-top: 8px;">
                        <span>${i18n[currentLang].views}: ${viewsCount}</span>
                        <span>${i18n[currentLang].released}: ${dateStr}</span>
                    </div>
                    <a href="/site/${siteName}" target="_blank">${i18n[currentLang].openBtn}</a>
                `;
                storeGrid.appendChild(card);
            });

            if (!hasVisibleSites) {
                storeGrid.innerHTML = `<span style="color:#666; font-size:14px;">${i18n[currentLang].emptyGallery}</span>`;
            }
        } catch (err) {
            storeGrid.innerHTML = `<span style="color:#ef4444; font-size:14px;">Error: ${err.message}</span>`;
        }
    }

    storeSearchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.store-card');
        cards.forEach(card => {
            const name = card.getAttribute('data-name');
            const desc = card.getAttribute('data-desc');
            if (name.includes(term) || desc.includes(term)) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    });

    document.getElementById('siteNameInput').addEventListener('input', () => {
        currentProjectCreatedAt = null; 
    });

    // --- ОБРАБОТКА СТРАНИЦЫ САЙТА (МЕТРИКИ И ПРОСМОТРЫ) ---
    const path = window.location.pathname;
    const segments = path.split('/').filter(Boolean); 

    if (segments.length >= 2 && segments[0] === 'site') {
        const siteName = segments[1];
        loadSiteFromDatabase(siteName);
    } else {
        document.getElementById('builder-mode').style.display = 'flex';
        switchLanguage('en'); 
        initBuilder();
    }

    async function loadSiteFromDatabase(name) {
        document.body.innerHTML = `<div id="site-runtime-wrapper" style="width:100vw; height:100vh; margin:0; padding:0; overflow:hidden; background:#0d0d0d;"></div>`;
        const wrapper = document.getElementById('site-runtime-wrapper');

        const offlineHTML = `<div style="height:100vh; display:flex; align-items:center; justify-content:center; background:#0d0d0d;"><h1 style="color:#ef4444;">${i18n[currentLang].siteOffline}</h1></div>`;
        const restartingHTML = `<div style="height:100vh; display:flex; align-items:center; justify-content:center; background:#0d0d0d;"><h1 style="color:#6b7280;">${i18n[currentLang].siteRestarting}</h1></div>`;

        try {
            const siteRef = doc(db, "published_sites", name);
            let isUnlocked = false;
            let viewsIncremented = false;

            onSnapshot(siteRef, async (docSnap) => {
                if (!docSnap.exists()) {
                    wrapper.innerHTML = offlineHTML;
                    return;
                }

                const data = docSnap.data();
                const status = data.status || 'online';
                const sitePassword = data.password || '';

                if (!viewsIncremented && status === 'online') {
                    viewsIncremented = true;
                    try {
                        await updateDoc(siteRef, { views: increment(1) });
                    } catch (e) { console.error(e); }
                }

                if (data.tabTitle) document.title = data.tabTitle;
                if (data.faviconUrl) {
                    let link = document.querySelector("link[rel~='icon']");
                    if (!link) {
                        link = document.createElement('link');
                        link.rel = 'icon';
                        document.head.appendChild(link);
                    }
                    link.href = data.faviconUrl;
                }

                if (sitePassword.trim() !== '' && !isUnlocked) {
                    wrapper.innerHTML = `
                        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0d0d0d; font-family: sans-serif;">
                            <h2 style="color: #fff; margin-bottom: 20px;">${i18n[currentLang].enterPass}</h2>
                            <div style="display: flex; gap: 10px;">
                                <input type="password" id="unlock-pass" style="padding: 12px; background: #141414; color: #fff; border: 1px solid #262626; border-radius:4px;">
                                <button id="unlock-btn" style="padding: 12px 20px; background: #4f46e5; color: #fff; border: none; font-weight:bold; border-radius:4px; cursor:pointer;">${i18n[currentLang].unlockBtn}</button>
                            </div>
                            <p id="unlock-error" style="color: #ef4444; display: none; margin-top: 15px;">${i18n[currentLang].wrongPass}</p>
                        </div>`;
                    document.getElementById('unlock-btn').addEventListener('click', () => {
                        if (document.getElementById('unlock-pass').value === sitePassword) {
                            isUnlocked = true;
                            renderContent(data, status);
                        } else {
                            document.getElementById('unlock-error').style.display = 'block';
                        }
                    });
                    return;
                }
                renderContent(data, status);
            });

            function renderContent(data, status) {
                if (status === 'offline') wrapper.innerHTML = offlineHTML;
                else if (status === 'restarting') wrapper.innerHTML = restartingHTML;
                else {
                    let iframe = document.getElementById('runtime-iframe');
                    if (!iframe) {
                        wrapper.innerHTML = `<iframe id="runtime-iframe" style="width: 100%; height: 100%; border: none; display: block; background: #fff;"></iframe>`;
                        iframe = document.getElementById('runtime-iframe');
                        iframe.srcdoc = data.code || '<h1>Empty</h1>';
                    } else if (iframe.dataset.currentCode !== data.code) {
                        iframe.srcdoc = data.code || '<h1>Empty</h1>';
                        iframe.dataset.currentCode = data.code || '';
                    }
                }
            }
        } catch (e) {
            wrapper.innerHTML = `<div style="height:100vh; display:flex; align-items:center; justify-content:center; color:#ef4444;">Error: ${e.message}</div>`;
        }
    }

    function initBuilder() {
        let currentUser = null;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            window.editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: projectFiles["index.html"],
                language: 'html',
                theme: 'vs-dark',
                automaticLayout: true
            });
            renderFilesList();
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => showToast(err.message, 'error'));
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('historyBlock').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                loadUserHistory(user.uid);
            }
        });

        document.getElementById('refreshHistoryBtn').addEventListener('click', () => {
            if (currentUser) loadUserHistory(currentUser.uid);
        });

        async function loadUserHistory(uid) {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '<span style="color:#666; font-size:12px;">...</span>'; 

            const q = query(collection(db, "published_sites"), where("ownerId", "==", uid));
            const querySnapshot = await getDocs(q);
            historyList.innerHTML = '';
            
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const siteName = docSnap.id;
                const status = data.status || 'online';
                
                let dotClass = 'status-online';
                if (status === 'offline') dotClass = 'status-offline';
                if (status === 'restarting') dotClass = 'status-restarting';

                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <div class="history-header">
                        <div class="history-header-left">
                            <span class="status-dot ${dotClass}" title="Status: ${status}"></span>
                            <a href="/site/${siteName}" target="_blank">/${siteName}</a>
                        </div>
                        <div class="menu-container">
                            <button class="dots-btn">⋮</button>
                            <div class="dropdown-content">
                                <button class="control-btn" data-action="edit" data-id="${siteName}">${i18n[currentLang].editCode}</button>
                                <button class="control-btn" data-action="power" data-id="${siteName}" data-status="${status}">${status === 'offline' ? i18n[currentLang].powerOn : i18n[currentLang].powerOff}</button>
                                <button class="control-btn" data-action="restart" data-id="${siteName}">${i18n[currentLang].restartSite}</button>
                                <button class="control-btn btn-delete" data-action="delete" data-id="${siteName}">${i18n[currentLang].deleteForever}</button>
                            </div>
                        </div>
                    </div>`;
                historyList.appendChild(li);
            });
            attachControlEvents();
        }

        function attachControlEvents() {
            document.querySelectorAll('.control-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const action = e.target.getAttribute('data-action');
                    const siteName = e.target.getAttribute('data-id');
                    const siteRef = doc(db, "published_sites", siteName);

                    sidebar.classList.remove('open');
                    sidebarOverlay.classList.remove('open');

                    if (action === 'edit') {
                        const snap = await getDoc(siteRef);
                        if(snap.exists()) {
                            const data = snap.data();
                            projectFiles = data.files || { "index.html": data.code };
                            currentFileName = "index.html";
                            currentProjectCreatedAt = data.createdAt || null;
                            
                            window.editor.setValue(projectFiles[currentFileName]);
                            updateEditorLanguage(currentFileName);
                            renderFilesList();

                            document.getElementById('siteNameInput').value = siteName;
                            document.getElementById('siteDescInput').value = data.description || '';
                            document.getElementById('sitePasswordInput').value = data.password || '';
                            document.getElementById('customTabTitle').value = data.tabTitle || '';
                            document.getElementById('customFavicon').value = data.faviconUrl || '';
                            document.getElementById('isPublicCheckbox').checked = data.isPublic || false;
                            
                            showToast(currentLang === 'ru' ? "Проект успешно загружен!" : "Project successfully loaded!");
                        }
                    } 
                    else if (action === 'power') {
                        const currentStatus = e.target.getAttribute('data-status');
                        const newStatus = currentStatus === 'offline' ? 'online' : 'offline';
                        await updateDoc(siteRef, { status: newStatus });
                        showToast(newStatus === 'online' ? (currentLang === 'ru' ? "Сайт запущен!" : "Site is live!") : (currentLang === 'ru' ? "Сайт выключен." : "Site turned off."));
                        loadUserHistory(currentUser.uid);
                    }
                    else if (action === 'restart') {
                        await updateDoc(siteRef, { status: 'restarting' });
                        showToast(currentLang === 'ru' ? "Перезагрузка..." : "Restarting...");
                        loadUserHistory(currentUser.uid);
                        setTimeout(async () => {
                            await updateDoc(siteRef, { status: 'online' });
                            loadUserHistory(currentUser.uid);
                        }, 3000);
                    }
                    else if (action === 'delete') {
                        if (confirm(currentLang === 'ru' ? `Удалить сайт ${siteName}?` : `Delete site ${siteName}?`)) {
                            await deleteDoc(siteRef);
                            showToast(currentLang === 'ru' ? "Сайт удален" : "Site deleted");
                            loadUserHistory(currentUser.uid);
                        }
                    }
                });
            });
        }

        document.getElementById('publishBtn').addEventListener('click', async () => {
            if (!currentUser) return showToast(currentLang === 'ru' ? "Войдите в аккаунт!" : "Log in first!", "error");
            
            const siteName = document.getElementById('siteNameInput').value.trim();
            const description = document.getElementById('siteDescInput').value.trim();
            const password = document.getElementById('sitePasswordInput').value.trim();
            const tabTitle = document.getElementById('customTabTitle').value.trim();
            const faviconUrl = document.getElementById('customFavicon').value.trim();
            const isPublic = document.getElementById('isPublicCheckbox').checked;
            
            if (!siteName || siteName.includes('/')) return showToast(currentLang === 'ru' ? "Введите корректное имя!" : "Enter valid name!", "error");

            const publishBtn = document.getElementById('publishBtn');
            publishBtn.disabled = true;
            
            const container = document.getElementById('toast-container');
            const loadingToast = document.createElement('div');
            loadingToast.className = 'toast toast-loading';
            loadingToast.innerHTML = `<span class="spinner"></span> ${currentLang === 'ru' ? 'Сохранение...' : 'Saving...'}`;
            container.appendChild(loadingToast);

            try {
                const compiled = compileProject();
                const timestamp = currentProjectCreatedAt || Date.now();
                
                await setDoc(doc(db, "published_sites", siteName), {
                    ownerId: currentUser.uid,
                    code: compiled,
                    files: projectFiles,
                    description: description,
                    password: password,
                    tabTitle: tabTitle,
                    faviconUrl: faviconUrl,
                    isPublic: isPublic, 
                    status: 'online',
                    createdAt: timestamp
                }, { merge: true });

                currentProjectCreatedAt = timestamp;
                loadingToast.remove();
                showToast(currentLang === 'ru' ? "Проект успешно сохранен!" : "Project saved successfully!");
                loadUserHistory(currentUser.uid);
                
                if (!storeContainer.classList.contains('hidden')) {
                    loadStoreSites();
                }
            } catch (err) {
                loadingToast.remove();
                showToast(`Error: ${err.message}`, 'error');
            } finally {
                publishBtn.disabled = false;
            }
        });
    }
</script>
</body>
</html>
