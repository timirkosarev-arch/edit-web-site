<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 5 Mods Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #1a1a1a; color: #fff; padding-bottom: 50px; }
        header { background: #111; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #00ff66; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; color: #00ff66; cursor: pointer; }
        nav button { background: #222; color: #fff; border: 1px solid #444; padding: 8px 15px; margin-left: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        nav button:hover { background: #00ff66; color: #000; border-color: #00ff66; }
        .btn-upload { background: #00ff66; color: #000; border: none; }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .screen { display: none; }
        .screen.active { display: block; }

        .form-box { background: #222; padding: 30px; border-radius: 8px; max-width: 500px; margin: 50px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .form-box h2 { margin-bottom: 20px; color: #00ff66; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; background: #333; border: 1px solid #555; color: #fff; border-radius: 4px; }
        input[type="file"] { background: none; border: none; }
        .form-box button { width: 100%; padding: 12px; background: #00ff66; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .form-box p { margin-top: 15px; text-align: center; color: #aaa; cursor: pointer; }

        .mods-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .mod-card { background: #222; border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.3s; display: flex; flex-direction: column; }
        .mod-card:hover { transform: translateY(-5px); border-color: #00ff66; }
        .mod-img { width: 100%; height: 180px; object-fit: cover; background: #333; }
        .mod-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .mod-title { font-size: 18px; margin-bottom: 8px; }
        .mod-desc { color: #aaa; font-size: 14px; margin-bottom: 15px; flex-grow: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .mod-actions { display: flex; gap: 10px; }
        .btn-download { background: #00ff66; color: #000; padding: 8px; text-align: center; text-decoration: none; font-weight: bold; border-radius: 4px; flex-grow: 1; border: none; cursor: pointer; font-size: 14px;}
        .btn-delete { background: #ff3333; color: #fff; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
        
        .loading { color: #00ff66; text-align: center; font-size: 18px; margin: 20px 0; display: none; }

        /* === СТИЛИ ДЛЯ ПЛАВНЫХ УВЕДОМЛЕНИЙ === */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 15px; }
        .toast { background: #222; color: #fff; padding: 15px 25px; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.6); transform: translateY(100px); opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-left: 5px solid #00ff66; font-weight: 500; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-left-color: #ff3333; }

        /* === СТИЛИ ДЛЯ СТРАНИЦЫ МОДА === */
        .btn-back { background: transparent; color: #00ff66; border: 1px solid #00ff66; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-bottom: 20px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-back:hover { background: #00ff66; color: #000; }
        .mod-details-box { background: #222; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .mod-details-box img { width: 100%; max-height: 500px; object-fit: contain; background: #111; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        .mod-details-box h2 { color: #00ff66; font-size: 28px; margin-bottom: 15px; }
        .mod-details-box p { color: #ccc; font-size: 16px; line-height: 1.6; margin-bottom: 25px; white-space: pre-wrap; }
        .detail-buttons { display: flex; gap: 15px; }
        .detail-buttons a { display: inline-block; padding: 12px 25px; font-size: 16px; border-radius: 6px; }
        .detail-buttons button { padding: 12px 25px; font-size: 16px; border-radius: 6px; font-weight: bold; }
        
        @media (max-width: 600px) { .detail-buttons { flex-direction: column; } }
    </style>
</head>
<body>

    <header>
        <div class="logo" id="logo-btn">GTA5 MODS</div>
        <nav>
            <span id="user-email" style="margin-right: 15px; color: #aaa;"></span>
            <button id="nav-main">Главная</button>
            <button id="nav-upload" class="btn-upload" style="display:none;">Upload (Загрузить)</button>
            <button id="nav-profile" style="display:none;">Мой Профиль</button>
            <button id="nav-auth">Войти</button>
            <button id="nav-logout" style="display:none;">Выйти</button>
        </nav>
    </header>

    <div class="container">
        <div id="loading-status" class="loading">Обработка данных, пожалуйста подождите...</div>

        <div id="screen-main" class="screen active">
            <h2>Все моды</h2>
            <div class="mods-grid" id="all-mods-container"></div>
        </div>

        <div id="screen-profile" class="screen">
            <h2>Мои загруженные моды</h2>
            <div class="mods-grid" id="my-mods-container"></div>
        </div>

        <div id="screen-mod-details" class="screen">
            <button class="btn-back" onclick="showScreen('main')">← Назад к списку</button>
            <div class="mod-details-box">
                <img id="detail-img" src="" alt="Mod Preview">
                <h2 id="detail-title">Название мода</h2>
                <p id="detail-desc">Описание мода</p>
                <div class="detail-buttons">
                    <a id="detail-download-btn" href="#" target="_blank" class="btn-download">⬇ Скачать мод</a>
                    <button class="btn-upload" onclick="copyModLink()">🔗 Поделиться ссылкой</button>
                </div>
            </div>
        </div>

        <div id="screen-upload" class="screen">
            <div class="form-box">
                <h2>Загрузить новый мод</h2>
                <input type="text" id="mod-title" placeholder="Название мода" required>
                <textarea id="mod-desc" placeholder="Описание мода" rows="4" required></textarea>
                
                <label>Картинка мода (Превью через ImgBB):</label>
                <input type="file" id="mod-image-file" accept="image/*" required>
                
                <label>Ссылка на скачивание архива/мода (Google Диск, Mediafire и т.д.):</label>
                <input type="url" id="mod-file-url" placeholder="https://..." required>
                
                <button id="submit-mod-btn">Опубликовать мод</button>
            </div>
        </div>

        <div id="screen-auth" class="screen">
            <div class="form-box" id="auth-login-form">
                <h2>Вход на сайт</h2>
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button id="login-btn">Войти</button>
                
                <button id="google-login-btn" style="background: #fff; color: #000; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="G" style="width: 18px;">
                    Войти через Google
                </button>
                
                <p onclick="toggleAuthForms(false)">Нет аккаунта? Зарегистрироваться</p>
            </div>
            <div class="form-box" id="auth-register-form" style="display:none;">
                <h2>Регистрация</h2>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-password" placeholder="Пароль (мин. 6 символов)" required>
                <button id="register-btn">Создать аккаунт</button>
                <p onclick="toggleAuthForms(true)">Уже есть аккаунт? Войти</p>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        import { firebaseConfig, IMGBBB_API_KEY } from "./config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        let currentUser = null;
        
        // Кэш для быстрой загрузки страниц модов без повторных запросов
        window.loadedMods = {}; 

        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400); 
            }, 3000);
        };

        window.toggleAuthForms = function(showLogin) {
            document.getElementById('auth-login-form').style.display = showLogin ? 'block' : 'none';
            document.getElementById('auth-register-form').style.display = showLogin ? 'none' : 'block';
        };

        // Открытие конкретного мода
        window.openModDetails = function(modId) {
            const modData = window.loadedMods[modId];
            if (!modData) return showToast("Ошибка: мод не найден", "error");

            document.getElementById('detail-img').src = modData.imageUrl;
            document.getElementById('detail-title').innerText = modData.title;
            document.getElementById('detail-desc').innerText = modData.description;
            document.getElementById('detail-download-btn').href = modData.fileUrl;

            // Добавляем ID мода в ссылку в адресной строке без перезагрузки страницы
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?mod=' + modId;
            window.history.pushState({path:newUrl}, '', newUrl);

            showScreen('mod-details');
        };

        // Копирование ссылки на страницу мода
        window.copyModLink = function() {
            const currentUrl = window.location.href;
            navigator.clipboard.writeText(currentUrl).then(() => {
                showToast("Ссылка на мод скопирована!", "success");
            }).catch(() => {
                showToast("Ошибка копирования", "error");
            });
        };

        const screens = ['main', 'profile', 'upload', 'auth', 'mod-details'];
        window.showScreen = function(screenName) {
            screens.forEach(s => {
                document.getElementById(`screen-${s}`).classList.remove('active');
            });
            document.getElementById(`screen-${screenName}`).classList.add('active');
            
            // Если мы уходим со страницы мода, очищаем ссылку в браузере
            if (screenName !== 'mod-details') {
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.pushState({path:cleanUrl}, '', cleanUrl);
            }

            if (screenName === 'main') loadAllMods();
            if (screenName === 'profile') loadMyMods();
        };

        document.getElementById('logo-btn').addEventListener('click', () => showScreen('main'));
        document.getElementById('nav-main').addEventListener('click', () => showScreen('main'));
        document.getElementById('nav-upload').addEventListener('click', () => showScreen('upload'));
        document.getElementById('nav-profile').addEventListener('click', () => showScreen('profile'));
        document.getElementById('nav-auth').addEventListener('click', () => showScreen('auth'));

        function toggleLoading(show) {
            document.getElementById('loading-status').style.display = show ? 'block' : 'none';
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('nav-auth').style.display = 'none';
                document.getElementById('nav-logout').style.display = 'inline-block';
                document.getElementById('nav-upload').style.display = 'inline-block';
                document.getElementById('nav-profile').style.display = 'inline-block';
                if(document.getElementById('screen-auth').classList.contains('active')) showScreen('main');
            } else {
                document.getElementById('user-email').innerText = '';
                document.getElementById('nav-auth').style.display = 'inline-block';
                document.getElementById('nav-logout').style.display = 'none';
                document.getElementById('nav-upload').style.display = 'none';
                document.getElementById('nav-profile').style.display = 'none';
            }
        });

        // Блок авторизации
        document.getElementById('register-btn').addEventListener('click', async () => { /* ...тот же код... */ });
        document.getElementById('login-btn').addEventListener('click', async () => { /* ...тот же код... */ });
        document.getElementById('google-login-btn').addEventListener('click', async () => { /* ...тот же код... */ });
        document.getElementById('nav-logout').addEventListener('click', () => { signOut(auth); showToast('Вы вышли из аккаунта', 'success'); });

        async function uploadImageToImgBB(file) {
            const formData = new FormData();
            formData.append("image", file);
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBBB_API_KEY}`, { method: "POST", body: formData });
            const data = await response.json();
            if (data.success) return data.data.url;
            throw new Error("Не удалось загрузить картинку на ImgBB");
        }

        document.getElementById('submit-mod-btn').addEventListener('click', async () => {
            if (!currentUser) return showToast("Войдите в аккаунт, чтобы добавить мод!", 'error');
            
            const title = document.getElementById('mod-title').value;
            const desc = document.getElementById('mod-desc').value;
            const imgFile = document.getElementById('mod-image-file').files[0];
            const fileUrl = document.getElementById('mod-file-url').value;
            
            if (!title || !desc || !imgFile || !fileUrl) return showToast("Пожалуйста, заполните все поля!", 'error');

            try {
                toggleLoading(true);
                const imageUrl = await uploadImageToImgBB(imgFile);
                await addDoc(collection(db, "mods"), {
                    title: title, description: desc, imageUrl: imageUrl, fileUrl: fileUrl,
                    userId: currentUser.uid, userEmail: currentUser.email, createdAt: Date.now()
                });
                showToast("Мод успешно опубликован!", 'success');
                document.getElementById('mod-title').value = '';
                document.getElementById('mod-desc').value = '';
                document.getElementById('mod-image-file').value = '';
                document.getElementById('mod-file-url').value = '';
                showScreen('main');
            } catch (error) { showToast("Ошибка при публикации: " + error.message, 'error'); } 
            finally { toggleLoading(false); }
        });

        function createModCard(modData, id, isProfile = false) {
            // Кнопка на карточке теперь не качает сразу, а открывает страницу мода
            return `
                <div class="mod-card" id="mod-${id}">
                    <img class="mod-img" src="${modData.imageUrl}" alt="${modData.title}">
                    <div class="mod-info">
                        <div>
                            <h3 class="mod-title">${modData.title}</h3>
                            <p class="mod-desc">${modData.description}</p>
                        </div>
                        <div class="mod-actions">
                            <button class="btn-download" onclick="openModDetails('${id}')">Подробнее</button>
                            ${isProfile ? `<button class="btn-delete" onclick="deleteMod('${id}')">Удалить</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadAllMods() {
            const container = document.getElementById('all-mods-container');
            container.innerHTML = '';
            try {
                const querySnapshot = await getDocs(collection(db, "mods"));
                window.loadedMods = {}; // Очищаем кэш перед загрузкой
                querySnapshot.forEach((doc) => {
                    window.loadedMods[doc.id] = doc.data(); // Сохраняем в кэш
                    container.innerHTML += createModCard(doc.data(), doc.id, false);
                });
                
                // Проверяем, есть ли в ссылке запрос на открытие конкретного мода
                const urlParams = new URLSearchParams(window.location.search);
                const modParam = urlParams.get('mod');
                if (modParam && window.loadedMods[modParam]) {
                    openModDetails(modParam);
                }

            } catch (e) { console.error("Ошибка получения модов: ", e); }
        }

        async function loadMyMods() {
            const container = document.getElementById('my-mods-container');
            container.innerHTML = '';
            if (!currentUser) return;
            try {
                const q = query(collection(db, "mods"), where("userId", "==", currentUser.uid));
                const querySnapshot = await getDocs(q);
                querySnapshot.forEach((doc) => {
                    window.loadedMods[doc.id] = doc.data();
                    container.innerHTML += createModCard(doc.data(), doc.id, true);
                });
            } catch (e) { console.error("Ошибка получения профильных модов: ", e); }
        }

        window.deleteMod = async function(modId) {
            if(!confirm("Вы уверены, что хотите удалить этот мод?")) return;
            try {
                toggleLoading(true);
                await deleteDoc(doc(db, "mods", modId));
                showToast("Мод удален!", 'success');
                loadMyMods();
            } catch (error) { showToast("Ошибка удаления: " + error.message, 'error'); } 
            finally { toggleLoading(false); }
        };

        // Инициализация при старте
        loadAllMods();
    </script>
</body>
</html>
